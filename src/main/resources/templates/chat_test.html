<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chat Test - WebSocket + JWT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 16px; }
        .setup-panel { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .setup-panel h2 { color: #1a73e8; margin-bottom: 16px; }
        .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        input[type="text"] { border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #1a73e8; }
        button { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary  { background: #1a73e8; color: white; }
        .btn-danger   { background: #e53935; color: white; }
        .btn-success  { background: #43a047; color: white; }
        .btn-warning  { background: #f57c00; color: white; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 8px; }
        .status.connected    { background: #e8f5e9; color: #2e7d32; }
        .status.disconnected { background: #ffebee; color: #c62828; }
        .chat-panel { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #1a73e8; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h3 { font-size: 16px; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: #f8f9fa; }
        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .msg-bubble .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 2px; opacity: 0.7; }
        .msg-bubble .msg-time   { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .msg-outgoing { align-self: flex-end;  background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .msg-incoming { align-self: flex-start; background: white; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .msg-system   { align-self: center; background: #fff3cd; color: #856404; font-size: 12px; padding: 6px 14px; border-radius: 20px; }
        .msg-history-divider { align-self: center; background: #e3f2fd; color: #1565c0; font-size: 11px; padding: 4px 14px; border-radius: 20px; }
        .chat-input-area { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
        .chat-input-area input:focus { border-color: #1a73e8; }
        .log-panel { background: #1e1e1e; color: #00ff88; border-radius: 12px; padding: 16px; margin-top: 16px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; }
        .log-error { color: #ff6b6b; }
        .log-info  { color: #74b9ff; }
        .log-warn  { color: #ffd93d; }
    </style>
</head>
<body>
<div class="container">

    <div class="setup-panel">
        <h2>⚙️ Cấu hình
            <span class="status disconnected" id="statusBadge">Disconnected</span>
        </h2>
        <div class="form-row" style="margin-bottom:12px;">
            <div class="form-group" style="flex:3;">
                <label>JWT Token</label>
                <input type="text" id="jwtToken" placeholder="eyJhbGci...">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Server URL</label>
                <input type="text" id="serverUrl" value="http://localhost:8080/api/v1">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>My ID</label>
                <input type="text" id="myId" placeholder="VD: 3">
            </div>
            <div class="form-group">
                <label>Receiver ID</label>
                <input type="text" id="receiverId" placeholder="VD: 2">
            </div>
            <button class="btn-primary" id="connectBtn" onclick="connect()">🔌 Connect</button>
            <button class="btn-danger"  id="disconnectBtn" onclick="disconnect()" disabled>❌ Disconnect</button>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            <h3>💬 Chat với User ID: <span id="chatWithLabel">-</span></h3>
            <!-- Nút load history — gọi REST API GET /chat/history/{id} -->
            <button class="btn-warning" id="historyBtn" onclick="loadHistory()" disabled
                    title="Load lịch sử chat từ DB (test xem có lưu không)">
                📜 Load History
            </button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg-system">Kết nối rồi bấm 📜 Load History để kiểm tra DB</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." disabled
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-success" id="sendBtn" onclick="sendMessage()" disabled>Gửi ➤</button>
        </div>
    </div>

    <div class="log-panel" id="logPanel">
        <div>📟 Debug log...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let myId = null;

    function connect() {
        const token      = document.getElementById('jwtToken').value.trim();
        const serverUrl  = document.getElementById('serverUrl').value.trim();
        myId             = document.getElementById('myId').value.trim();
        const receiverId = document.getElementById('receiverId').value.trim();

        if (!token || !myId || !receiverId) {
            addLog('❌ Điền đủ JWT, My ID và Receiver ID', 'error');
            return;
        }
        document.getElementById('chatWithLabel').textContent = receiverId;

        const cleanToken = token.startsWith('Bearer ') ? token.substring(7) : token;
        const roomKey = Math.min(parseInt(myId), parseInt(receiverId)) + '_' + Math.max(parseInt(myId), parseInt(receiverId));

        const socket = new SockJS(`${document.getElementById('serverUrl').value.trim()}/ws`);
        stompClient  = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            { 'Authorization': 'Bearer ' + cleanToken },
            (frame) => {
                addLog(`✅ Connected!`, 'info');
                setConnected(true);

                const topic = `/topic/chat.${roomKey}`;
                stompClient.subscribe(topic, (message) => {
                    const data = JSON.parse(message.body);
                    addLog(`📨 Received: senderId=${data.senderId} | ${data.content}`);
                    showMessage(data, false);
                });
                addLog(`📡 Subscribed to ${topic}`);
            },
            (error) => {
                addLog(`❌ ${error}`, 'error');
                setConnected(false);
            }
        );
    }

    function disconnect() {
        if (stompClient) stompClient.disconnect(() => {
            addLog('🔌 Disconnected', 'warn');
            setConnected(false);
        });
    }

    function sendMessage() {
        const content    = document.getElementById('messageInput').value.trim();
        const receiverId = document.getElementById('receiverId').value.trim();
        if (!content || !stompClient?.connected) return;

        stompClient.send('/app/chat.send', {}, JSON.stringify({
            receiverId: parseInt(receiverId),
            content
        }));
        addLog(`📤 Sent: ${content}`);
        document.getElementById('messageInput').value = '';
    }

    /**
     * Gọi REST API GET /chat/history/{otherUserId}
     * Cần JWT trong header Authorization
     * Dùng để kiểm tra: tin nhắn có được lưu vào DB không?
     */
    async function loadHistory() {
        const serverUrl  = document.getElementById('serverUrl').value.trim();
        const receiverId = document.getElementById('receiverId').value.trim();
        const token      = document.getElementById('jwtToken').value.trim();
        const cleanToken = token.startsWith('Bearer ') ? token.substring(7) : token;

        addLog(`🔄 Loading history with user ${receiverId}...`, 'info');

        try {
            const res = await fetch(`${serverUrl}/chat/history/${receiverId}`, {
                headers: { 'Authorization': 'Bearer ' + cleanToken }
            });

            if (!res.ok) {
                addLog(`❌ HTTP ${res.status} - ${res.statusText}`, 'error');
                return;
            }

            const json = await res.json();
            const messages = json.result; // theo pattern ApiResponse<T> của project

            if (!messages || messages.length === 0) {
                addLog(`⚠️ Không có lịch sử chat — DB trống hoặc chưa chat lần nào`, 'warn');
                addDivider('Không có lịch sử');
                return;
            }

            // Xóa màn hình hiện tại và render lại từ DB
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            addDivider(`📦 Lịch sử từ DB: ${messages.length} tin nhắn`);

            messages.forEach(msg => showMessage(msg, true));

            addLog(`✅ Loaded ${messages.length} messages from DB`, 'info');

        } catch (err) {
            addLog(`❌ Fetch error: ${err.message}`, 'error');
        }
    }

    // ==================== UI HELPERS ====================

    function showMessage(data, isHistory) {
        const container = document.getElementById('chatMessages');
        const div       = document.createElement('div');
        const isMine    = String(data.senderId) === String(myId);
        div.className   = `msg-bubble ${isMine ? 'msg-outgoing' : 'msg-incoming'}`;

        const time = data.sentAt
            ? new Date(data.sentAt).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
            : new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

        // Tin history thêm badge nhỏ để phân biệt
        const historyBadge = isHistory ? ' <span style="font-size:9px;opacity:0.5">[DB]</span>' : '';

        div.innerHTML = `
            ${!isMine ? `<div class="sender-name">${data.senderName || 'User ' + data.senderId}</div>` : ''}
            <div>${escapeHtml(data.content)}${historyBadge}</div>
            <div class="msg-time">${time}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addDivider(text) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'msg-history-divider';
        div.textContent = text;
        container.appendChild(div);
    }

    function setConnected(on) {
        document.getElementById('statusBadge').textContent  = on ? 'Connected' : 'Disconnected';
        document.getElementById('statusBadge').className    = `status ${on ? 'connected' : 'disconnected'}`;
        document.getElementById('connectBtn').disabled      = on;
        document.getElementById('disconnectBtn').disabled   = !on;
        document.getElementById('messageInput').disabled    = !on;
        document.getElementById('sendBtn').disabled         = !on;
        document.getElementById('historyBtn').disabled      = false; // load history lúc nào cũng được
        document.getElementById('jwtToken').disabled        = on;
        document.getElementById('myId').disabled            = on;
        document.getElementById('receiverId').disabled      = on;
    }

    function addLog(text, type = '') {
        const panel = document.getElementById('logPanel');
        const div   = document.createElement('div');
        div.className   = type === 'error' ? 'log-error' : type === 'info' ? 'log-info' : type === 'warn' ? 'log-warn' : '';
        div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
        panel.appendChild(div);
        panel.scrollTop = panel.scrollHeight;
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(text));
        return d.innerHTML;
    }
</script>
</body>
</html>
